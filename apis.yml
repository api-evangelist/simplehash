aid: simplehash
name: SimpleHash
description: >-
  NFT data API aggregating metadata, ownership, transfers, floor prices, and
  token market data across 80+ blockchains. Provides REST API, webhooks, and
  Kafka streaming used by wallets, marketplaces, and analytics platforms
  including Coinbase, Phantom, Ledger, and Uniswap. Indexes 3B+ tokens and
  NFTs with 99.999% uptime SLA.
type: Index
